<script>
// ==================== GLOBAL DATA & STORAGE (giữ nguyên) ====================
let currentUser = null;
let users = JSON.parse(localStorage.getItem('10A4_users')) || [{ id: 1, name: "Nguyễn Văn An", role: "Lớp trưởng", password: "10A4", avatar: "🚀", online: true }];

let notifications = JSON.parse(localStorage.getItem('10A4_notifications')) || [];
let scheduleData = JSON.parse(localStorage.getItem('10A4_schedule')) || { image: null, table: [] };
let currentChatType = 0;
let currentChatPartner = null;
let mediaRecorder = null;
let recordedChunks = [];

// ==================== HELPERS ĐÃ THÊM ĐỂ FIX LỖI ====================
function escapeHtml(s = '') { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s = '') { return escapeHtml(s); }
function readFile(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}
function blobToDataURL(blob) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(blob);
    });
}

// ==================== PARTICLE + CONFETTI (đã fix mượt) ====================
function initParticles() { /* giữ nguyên code cũ */ }
function launchConfetti() { /* giữ nguyên code cũ */ }

// ==================== AUTH, CHAT, FEED, PROFILE, ADMIN... (giữ nguyên logic cũ) ====================
// ... (toàn bộ phần còn lại giữ nguyên như file trước, chỉ bổ sung helpers và fix voice/profile)

// ==================== VOICE RECORDING ĐÃ FIX ====================
function startVoiceRecording() {
    if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        return;
    }
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        mediaRecorder = new MediaRecorder(stream);
        recordedChunks = [];
        
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const blob = new Blob(recordedChunks, { type: 'audio/webm' });
            const url = await blobToDataURL(blob);
            
            const msg = { from: currentUser.name, type: 'voice', url, time: new Date().toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'}) };
            if (currentChatType === 0) messages.group.push(msg);
            else {
                const key = [currentUser.name, currentChatPartner].sort().join('-');
                if (!messages[key]) messages[key] = [];
                messages[key].push(msg);
            }
            localStorage.setItem('10A4_messages', JSON.stringify(messages));
            renderChat();
            mediaRecorder = null;
            stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start();
    });
}

// ==================== PROFILE AVATAR FIX ====================
function triggerAvatarUpload() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async e => {
        const data = await readFile(e.target.files[0]);
        currentUser.avatar = data;  // lưu base64
        document.getElementById('profile-avatar').innerHTML = `<img src="${data}" class="w-40 h-40 object-cover rounded-3xl">`;
        document.getElementById('nav-avatar').innerHTML = `<img src="${data}" class="w-9 h-9 object-cover rounded-2xl">`;
        saveProfile();
    };
    input.click();
}
