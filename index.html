:root {

}

* {

  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  overflow-x: hidden;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #0a0a0a;
  color: #fff;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:

  z-index: -1;
  animation: float 20s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  33% { transform: translateY(-20px) rotate(120deg); }
  66% { transform: translateY(20px) rotate(240deg); }

body.light {

}

body.light::before {
  opacity: 0.5;
}

/* PARTICLES */
.particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: var(--accent);
  border-radius: 50%;
  animation: particleFloat 25s linear infinite;
}

@keyframes particleFloat {
  0% {
    transform: translateY(100vh) scale(0) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(-100vh) scale(1) rotate(360deg);
    opacity: 0;
  }
}

/* NAV */
nav {
  position: fixed;
  top: 0;

  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

nav.scrolled {

  box-shadow: var(--shadow);
  padding: 0.5rem 5%;
}

nav .logo {

  background: var(--primary);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}

nav .nav-controls button {

  padding: 0.8rem 1.5rem;
  border: none;
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  border-radius: 50px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  position: relative;
  overflow: hidden;
}

nav .nav-controls button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}

nav .nav-controls button:hover::before {
  left: 100%;
}

nav .nav-controls button:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: var(--glow);
}

.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;

@keyframes titleGlow {
  from { filter: drop-shadow(0 0 20px #00f2fe); }
  to { filter: drop-shadow(0 0 40px #00f2fe); }
}

.hero .subtitle {
  font-size: clamp(1.2rem, 3vw, 2rem);

  margin-bottom: 3rem;
  font-weight: 300;
  letter-spacing: 1px;
}

.hero .user-status {

}

section {

section h2::after {

  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 4px;
  background: var(--primary);

}

.grid {

  gap: 2rem;
}

.card {

  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 2.5rem;
  border-radius: 24px;
  transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--accent);
  transform: scaleX(0);
  transition: transform 0.5s ease;
}

.card:hover::before {
  transform: scaleX(1);
}

.card:hover {
  transform: translateY(-15px) rotateX(5deg);
  background: rgba(255, 255, 255, 0.12);
  box-shadow: 0 35px 60px rgba(0,0,0,0.3);
}

.card-icon {
  font-size: 3.5rem;
  margin-bottom: 1rem;
  display: block;
  filter: drop-shadow(0 10px 20px rgba(0,242,254,0.3));
}

.card h3 {
  font-size: 1.5rem;
  margin-bottom: 0.5rem;
  font-weight: 700;
}

/* MESSAGE SYSTEM */
.message-input {
  max-width: 700px;
  margin: 0 auto 3rem;
}

#msg {
  width: 100%;
  padding: 1.5rem 2rem;
  border: none;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.08);
  color: #fff;
  font-size: 1.1rem;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  margin-bottom: 1rem;
}

#msg:focus {
  outline: none;
  background: rgba(255, 255, 255, 0.12);
  box-shadow: var(--glow);
  transform: scale(1.02);
}

#msg::placeholder {
  color: rgba(255, 255, 255, 0.5);
}

.btn-message {
  width: 100%;
  padding: 1.2rem;
  background: var(--accent);
  border: none;
  border-radius: 16px;
  color: #fff;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-message:hover {
  transform: translateY(-3px);
  box-shadow: var(--glow);
}

/* LOGIN MODAL */
#loginBox {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(30px);
  padding: 3rem;
  border-radius: 24px;
  display: none;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 50px 100px rgba(0,0,0,0.5);
  z-index: 2000;
  max-width: 450px;
  width: 90%;
  animation: modalAppear 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

@keyframes modalAppear {
  to {
    transform: translate(-50%, -50%) scale(1);
  }
}

#loginBox h3 {
  font-family: 'Orbitron', monospace;
  font-size: 1.8rem;
  margin-bottom: 1rem;
  text-align: center;
  background: var(--primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  nav { padding: 1rem 3%; }
  .grid { grid-template-columns: 1fr; gap: 1.5rem; }
  section { padding: 80px 3%; }
}

/* LOADING */
.loading {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 3px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  border-top-color: #fff;
  animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* SCROLL INDICATOR */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 0%;
  height: 4px;
  background: var(--accent);
  z-index: 1001;
  transition: width 0.1s ease;
}
</style>
</head>
