    <style>
        /* ==========================================================================

        :root {

            --neon-purple: #aa00ff;

            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a2e;

            --gradient-main: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            --gradient-neon: linear-gradient(45deg, #00f5ff, #aa00ff, #ff00ff, #00f5ff);
            --shadow-neon: 0 10px 30px rgba(0, 245, 255, 0.3);

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--gradient-main);
            color: var(--text-primary);
            overflow-x: hidden;

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out;
        }

        .loading-logo {

            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glowPulse 2s ease-in-out infinite alternate;
            text-shadow: var(--glow-blue);
            margin-bottom: 2rem;
        }

        .loading-bar {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loading-progress {
            height: 100%;
            background: var(--gradient-neon);
            width: 0%;
            border-radius: 2px;
            animation: loadingFill 3s ease-out forwards;
            box-shadow: var(--glow-blue);
        }

        @keyframes glowPulse {
            0% { filter: drop-shadow(var(--glow-blue)); }
            100% { filter: drop-shadow(var(--glow-purple)); }
