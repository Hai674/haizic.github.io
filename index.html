<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10A4 - GOD LEVEL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  overflow-x:hidden;
}

/* NAVBAR */
nav{
  position:fixed;
  width:100%;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  backdrop-filter: blur(15px);
  background:rgba(255,255,255,0.05);
  z-index:999;
}

nav h1{
  font-weight:800;
  letter-spacing:2px;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:25px;
  transition:0.3s;
}

nav a:hover{
  color:#00f7ff;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h2{
  font-size:60px;
  background:linear-gradient(90deg,#00f7ff,#00ffae);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  margin-top:20px;
  opacity:0.8;
}

.btn{
  margin-top:30px;
  padding:15px 40px;
  border-radius:50px;
  border:none;
  cursor:pointer;
  background:linear-gradient(90deg,#00f7ff,#00ffae);
  color:black;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* GLASS CARD */
.section{
  padding:100px 10%;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:40px;
  backdrop-filter: blur(20px);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-10px);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  opacity:0.6;
}

/* PARTICLES */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* ANIMATION */
.fade{
  opacity:0;
  transform:translateY(50px);
  transition:1s;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
  <h1>10A4</h1>
  <div>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Team</a>
  </div>
</nav>

<section class="hero">
  <h2>10A4 - ĐỈNH CAO</h2>
  <p>Giáo viên: Đinh Trung Thiện | 38 học sinh</p>
  <button class="btn">Khám phá ngay</button>
</section>

<section class="section">
  <div class="grid">
    <div class="card fade">
      <h3>🔥 Đoàn Kết</h3>
      <p>Lớp 10A4 luôn gắn kết như gia đình.</p>
    </div>

    <div class="card fade">
      <h3>🚀 Năng Động</h3>
      <p>Hoạt động mạnh mẽ, không ngừng phát triển.</p>
    </div>

    <div class="card fade">
      <h3>💎 Sáng Tạo</h3>
      <p>Ý tưởng độc đáo, không giới hạn.</p>
    </div>
  </div>
</section>

<footer>
  © 2026 - 10A4 GOD LEVEL
</footer>

<script>
// SCROLL ANIMATION
const fades = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  fades.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});

// PARTICLES BACKGROUND
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  update();
}

function update(){
  particles.forEach(p=>{
    p.y += p.d;
    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random()*canvas.width;
    }
  });
}

setInterval(draw,33);
</script>

</body>
</html>
