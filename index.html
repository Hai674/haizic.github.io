<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10A4 • THPT Gia Viễn • Nơi chúng ta tỏa sáng!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet">
    
    <!-- 🔥 Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;family=Inter:wght@400;500&amp;display=swap');
        :root { --tw-color-primary: #003087; --tw-color-accent: #FF7F00; --tw-color-neon: #A020F0; }
        * { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); }
        .neon-text { text-shadow: 0 0 10px #A020F0, 0 0 20px #A020F0; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* Chat styles */
        #chat-messages { scrollbar-width: thin; scrollbar-color: #FF7F00 #ffffff10; }
        #chat-messages::-webkit-scrollbar { height: 6px; }
    </style>
</head>
<body class="bg-[#003087] text-white min-h-screen overflow-x-hidden">
<!-- (Login screen, OTP modal, Sidebar giữ nguyên như cũ) -->
<div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center hero-bg">
    <canvas id="particle-canvas" class="absolute inset-0 pointer-events-none"></canvas>
    <div class="max-w-lg w-full mx-4 glass rounded-3xl p-10 shadow-2xl border border-white/20">
        <!-- ... nội dung login giữ nguyên y chang ... -->
        <!-- (mình giữ nguyên toàn bộ phần login để ngắn gọn) -->
        <div class="flex justify-center mb-6">
            <div class="w-20 h-20 bg-[#FF7F00] rounded-2xl flex items-center justify-center text-5xl shadow-inner neon-text">🏫</div>
        </div>
        <h1 class="title-font text-4xl font-bold text-center mb-2 neon-text">CYBERSECR 10A4</h1>
        <p class="text-center text-white/70 mb-8">Lớp 10A4 THPT Gia Viễn • 2025-2026</p>
        <div class="flex mb-8 border-b border-white/20">
            <button onclick="switchAuthTab(0)" id="tab-login" class="flex-1 py-3 font-bold border-b-2 border-[#FF7F00] text-[#FF7F00]">Đăng nhập</button>
            <button onclick="switchAuthTab(1)" id="tab-register" class="flex-1 py-3 font-bold">Đăng ký</button>
        </div>
        <div id="form-login"> ... </div>
        <div id="form-register" class="hidden"> ... </div>
        <div id="form-forgot" class="hidden"> ... </div>
        <div id="form-new-password" class="hidden"> ... </div>
        <p id="auth-message" class="text-center text-sm mt-6 min-h-[24px]"></p>
    </div>
</div>

<!-- OTP MODAL giữ nguyên -->
<!-- MAIN APP giữ nguyên sidebar -->
<div id="main-app" class="hidden flex h-screen bg-[#001f5a]">
    <div class="w-72 bg-black/40 backdrop-blur-lg border-r border-white/10 p-6 flex flex-col">
        <!-- Sidebar giữ nguyên -->
        ... (giữ nguyên toàn bộ sidebar) ...
    </div>
    
    <!-- Content Area -->
    <div class="flex-1 overflow-auto">
        <!-- HOME giữ nguyên -->
        <div id="page-home" class="page active p-8"> ... </div>
        
        <!-- CHAT - ĐÃ ĐƯỢC NÂNG CẤP REALTIME -->
        <div id="page-chat" class="page flex flex-col h-full p-8 hidden">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-[#A020F0] rounded-2xl flex items-center justify-center text-4xl shadow-inner">💬</div>
                    <div>
                        <h2 class="title-font text-4xl font-bold neon-text">Phòng Chat Lớp 10A4</h2>
                        <p class="text-white/60 flex items-center gap-2">
                            <span class="relative flex h-3 w-3">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#00FF88] opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 bg-[#00FF88]"></span>
                            </span>
                            Realtime • Mọi người đang online
                        </p>
                    </div>
                </div>
                <button onclick="clearChat()" class="px-5 py-2 text-sm bg-white/10 hover:bg-white/20 rounded-2xl flex items-center gap-2">
                    🗑️ Xóa lịch sử (demo)
                </button>
            </div>
            
            <!-- Danh sách tin nhắn -->
            <div id="chat-messages" class="flex-1 overflow-y-auto space-y-6 p-6 bg-black/30 rounded-3xl mb-6"></div>
            
            <!-- Ô nhập tin nhắn -->
            <div class="flex gap-4">
                <input id="chat-input" 
                       type="text" 
                       placeholder="Nhập tin nhắn..." 
                       class="flex-1 px-6 py-5 bg-white/10 border border-white/30 rounded-3xl text-lg focus:outline-none focus:border-[#FF7F00]"
                       onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()" 
                        class="px-10 bg-[#FF7F00] hover:bg-[#FF9F33] text-[#003087] font-bold text-xl rounded-3xl flex items-center gap-3">
                    Gửi 
                    <span class="text-3xl leading-none">→</span>
                </button>
            </div>
        </div>
        
        <!-- Các trang khác giữ nguyên -->
        <div id="page-schedule" class="page p-8 hidden">...</div>
        <div id="page-playlist" class="page p-8 hidden">...</div>
        <div id="page-album" class="page p-8 hidden">...</div>
        <div id="page-members" class="page p-8 hidden">...</div>
    </div>
</div>

<script>
// ==================== DỮ LIỆU & BIẾN (giữ nguyên) ====================
let users = JSON.parse(localStorage.getItem('10A4_users')) || [
    { id: 1, name: "Nguyễn Văn An", email: "an10a4@gmail.com", password: "10A4", avatar: "🚀", nick: "An Pro" }
];
let currentUser = JSON.parse(localStorage.getItem('10A4_currentUser')) || null;
let currentOTP = null;
let currentAction = null;
let tempRegisterData = null;
let tempForgotEmail = null;

// ==================== FIREBASE CONFIG ====================
// 🔥 THAY BẰNG CONFIG CỦA BẠN TẠI ĐÂY 🔥
const firebaseConfig = {
  apiKey: "YOUR_API_KEY_HERE",
  authDomain: "your-project.firebaseapp.com",
  databaseURL: "https://your-project-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "your-project",
  storageBucket: "your-project.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:xxxxxxxxxxxxxxxx"
};

// ==================== PARTICLE & CONFETTI (giữ nguyên) ====================
// ... (giữ nguyên toàn bộ code particle, confetti, auth logic cũ) ...

// ==================== FIREBASE INIT ====================
let db = null;

function initFirebase() {
    if (typeof firebase === "undefined") {
        console.error("❌ Firebase SDK chưa load");
        return;
    }
    try {
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        db = firebase.database();
        console.log('%c✅ Firebase Realtime Database đã kết nối!', 'color:#FF7F00;font-weight:bold');
    } catch (e) {
        console.error("Firebase init error:", e);
    }
}

// ==================== CHAT FUNCTIONS ====================
let messagesRef = null;

function loadChat() {
    if (!db || !currentUser) {
        document.getElementById('chat-messages').innerHTML = `<div class="text-center py-20 text-white/50">Đăng nhập để tham gia chat lớp...</div>`;
        return;
    }
    
    const messagesDiv = document.getElementById('chat-messages');
    messagesDiv.innerHTML = '';
    
    messagesRef = db.ref('chats/10A4/messages');
    
    // Lấy 100 tin nhắn mới nhất
    messagesRef.orderByChild('timestamp').limitToLast(100).on('child_added', (snapshot) => {
        const msg = snapshot.val();
        if (msg) appendMessage(msg, messagesDiv);
    });
}

function appendMessage(msg, container) {
    const isOwn = currentUser && msg.name === currentUser.name;
    const time = new Date(msg.timestamp).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    
    const html = `
        <div class="flex ${isOwn ? 'justify-end' : 'justify-start'} group">
            <div class="${isOwn ? 'max-w-[75%]' : 'max-w-[75%]'}">
                <div class="flex items-center gap-2 ${isOwn ? 'flex-row-reverse' : ''} mb-1">
                    <div class="w-8 h-8 bg-[#FF7F00] rounded-2xl flex items-center justify-center text-xl flex-shrink-0">${msg.avatar || '👤'}</div>
                    <span class="text-xs text-white/70">${msg.name}</span>
                    <span class="text-xs text-white/40">${time}</span>
                </div>
                <div class="px-5 py-4 rounded-3xl ${isOwn 
                    ? 'bg-[#FF7F00] text-[#003087] rounded-br-none' 
                    : 'bg-white/10 text-white rounded-bl-none'}">
                    ${msg.text}
                </div>
            </div>
        </div>`;
    
    container.innerHTML += html;
    container.scrollTop = container.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    
    if (!text || !currentUser || !messagesRef) return;
    
    const messageData = {
        name: currentUser.name,
        avatar: currentUser.avatar || '👤',
        text: text,
        timestamp: firebase.database.ServerValue.TIMESTAMP
    };
    
    messagesRef.push(messageData);
    input.value = '';
}

function clearChat() {
    if (confirm('🗑️ Xóa toàn bộ lịch sử chat lớp? (Chỉ dùng để demo)')) {
        if (messagesRef) messagesRef.remove();
    }
}

// ==================== SWITCH PAGE (thêm load chat) ====================
function switchPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    const target = document.getElementById('page-' + page);
    if (target) target.classList.remove('hidden');
    
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active', 'bg-white/10'));
    const activeBtn = document.getElementById('nav-' + page);
    if (activeBtn) activeBtn.classList.add('active', 'bg-white/10');
    
    if (page === 'chat') loadChat();
}

// ==================== AUTH & LOGIN (giữ nguyên + init Firebase) ====================
function loginSuccess(user) {
    currentUser = user;
    localStorage.setItem('10A4_currentUser', JSON.stringify(currentUser));
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    
    document.getElementById('welcome-name').textContent = user.name;
    document.getElementById('user-name-sidebar').textContent = user.name;
    document.getElementById('user-avatar-sidebar').innerHTML = `<span>${user.avatar}</span>`;
    
    initFirebase();           // ← Khởi động Firebase khi login
    launchConfetti();
    startMusic();
}

// ==================== KHỞI ĐỘNG ====================
window.onload = () => {
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    initParticles();
    animateParticles();
    
    initFirebase();   // Khởi động Firebase ngay cả khi đã login trước
    
    if (currentUser) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('welcome-name').textContent = currentUser.name;
        document.getElementById('user-name-sidebar').textContent = currentUser.name;
        document.getElementById('user-avatar-sidebar').innerHTML = `<span>${currentUser.avatar}</span>`;
    }
    
    console.log('%c✅ CYBERSECR 10A4 + Realtime Chat Firebase READY!', 'color:#FF7F00;font-size:20px;font-weight:bold');
};

// (Giữ nguyên toàn bộ hàm auth, particle, music... như file cũ của bạn)
</script>
</body>
</html>
