<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10A4 SYSTEM FINAL</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{font-family:sans-serif;margin:0;background:#0f2027;color:white}
#auth{padding:20px;text-align:center}
#app{display:none;padding:10px}
.chat{height:250px;overflow:auto;border:1px solid #fff;padding:10px}
.msg{margin:5px 0}
.gallery img{width:80px;margin:5px}
</style>
</head>

<body>

<div id="auth">
  <h3>Login / Register</h3>
  <input id="email" placeholder="Email"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="app">
  <h3 id="info"></h3>

  <h4>💬 Chat</h4>
  <div class="chat" id="chat"></div>
  <input id="msg"><button onclick="send()">Gửi</button>

  <h4>🤖 AI</h4>
  <div id="ai"></div>
  <input id="aiInput"><button onclick="askAI()">Hỏi</button>

  <h4>📸 Upload ảnh</h4>
  <input type="file" onchange="upload(event)">
  <div class="gallery" id="gallery"></div>

  <h4>🏆 Rank</h4>
  <div id="rank"></div>
</div>

<script>
// 🔥 DÁN CONFIG VÀO
const firebaseConfig = {
  apiKey:"DÁN",
  authDomain:"DÁN",
  projectId:"DÁN",
  storageBucket:"DÁN"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let userData = {};

// REGISTER
function register(){
  auth.createUserWithEmailAndPassword(email.value,pass.value)
  .then(res=>{
    return db.collection("users").doc(res.user.uid).set({
      name:email.value,
      coin:0,
      exp:0
    });
  }).catch(alert);
}

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(email.value,pass.value)
  .catch(alert);
}

// AUTH CHECK
auth.onAuthStateChanged(async user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";

    let doc = await db.collection("users").doc(user.uid).get();
    userData = doc.data();

    info.innerText = userData.name + " | 💰 "+userData.coin+" | ⭐ "+userData.exp;

    loadChat();
    loadGallery();
    loadRank();
  }
});

// SEND CHAT
function send(){
  if(!msg.value) return;

  db.collection("chat").add({
    text:msg.value,
    name:userData.name,
    time:Date.now()
  });

  db.collection("users").doc(auth.currentUser.uid).update({
    coin: firebase.firestore.FieldValue.increment(1),
    exp: firebase.firestore.FieldValue.increment(2)
  });

  msg.value="";
}

// LOAD CHAT
function loadChat(){
  db.collection("chat").orderBy("time")
  .onSnapshot(s=>{
    chat.innerHTML="";
    s.forEach(doc=>{
      let d = doc.data();
      chat.innerHTML += `<div class="msg"><b>${d.name}:</b> ${d.text}</div>`;
    });
  });
}

// AI (fallback)
function askAI(){
  let q = aiInput.value;
  let res = "Không hiểu 😅";

  if(q.includes("10A4")) res="10A4 number one 🔥";
  if(q.includes("ai đẹp")) res="Bạn đẹp nhất 😎";

  ai.innerHTML += `<div><b>Bạn:</b> ${q}<br><b>AI:</b> ${res}</div>`;
  aiInput.value="";
}

// UPLOAD
function upload(e){
  let file = e.target.files[0];
  let ref = storage.ref("img/"+Date.now()+file.name);

  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.collection("gallery").add({url});
    });
  });
}

// LOAD GALLERY
function loadGallery(){
  db.collection("gallery").onSnapshot(s=>{
    gallery.innerHTML="";
    s.forEach(doc=>{
      gallery.innerHTML+=`<img src="${doc.data().url}">`;
    });
  });
}

// LOAD RANK
function loadRank(){
  db.collection("users").orderBy("exp","desc")
  .onSnapshot(s=>{
    rank.innerHTML="";
    s.forEach(doc=>{
      let d = doc.data();
      rank.innerHTML+=`<div>${d.name} - ⭐ ${d.exp}</div>`;
    });
  });
}
</script>

</body>
</html>
