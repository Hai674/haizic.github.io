<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10A4 ULTRA GENIUS | Lớp 10A4</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0a23;
            --bg-light: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            --glass-dark: rgba(255,255,255,0.08);
            --glass-light: rgba(255,255,255,0.15);
            --primary-glow: linear-gradient(45deg, #3b82f6, #8b5cf6, #ec4899);
            --accent-glow: #00f2fe;
            --success-glow: linear-gradient(45deg, #10b981, #34d399);
            --warning-glow: linear-gradient(45deg, #f59e0b, #fbbf24);
            --danger-glow: linear-gradient(45deg, #ef4444, #f87171);
            --card-glow: rgba(59,130,246,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #3b82f6, transparent),
                radial-gradient(2px 2px at 40px 70px, #8b5cf6, transparent),
                radial-gradient(1px 1px at 90px 40px, #ec4899, transparent),
                radial-gradient(1px 1px at 130px 80px, #00f2fe, transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: stars 22s linear infinite;
            z-index: -1;
            opacity: 0.5;
        }

        @keyframes stars { from { transform: translateY(0px); } to { transform: translateY(-300px); } }

        body.light { background: var(--bg-light); }

        /* PROGRESS BAR */
        .progress-bar {
            position: fixed; top: 0; left: 0; height: 5px;
            background: var(--primary-glow);
            z-index: 9999;
            transition: width 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* NAV */
        nav {
            position: fixed; top: 0; width: 100%; padding: 1.2rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(30px); background: var(--glass-dark);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            z-index: 1000; box-shadow: 0 4px 30px rgba(0,0,0,0.4);
        }

        .logo {
            font-family: 'Orbitron', monospace; font-size: 2.4rem; font-weight: 900;
            background: var(--primary-glow); -webkit-background-clip: text;
            background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(59,130,246,0.7); line-height: 1; letter-spacing: -2px;
        }

        .nav-btns { display: flex; gap: 1rem; align-items: center; }

        .nav-btns button {
            padding: 0.9rem 1.8rem; border: none;
            background: rgba(255,255,255,0.12); color: white;
            border-radius: 50px; cursor: pointer;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            font-size: 1.05rem; font-weight: 600;
            position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
            will-change: transform, box-shadow;
        }

        .nav-btns button:hover {
            transform: translateY(-4px) scale(1.08);
            box-shadow: 0 20px 40px var(--card-glow);
            background: rgba(255,255,255,0.25);
        }

        /* HERO */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 0 2rem; position: relative; overflow: hidden;
        }

        /* PARTICLE CANVAS */
        #particleCanvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
            pointer-events: none;
        }

        .hero::after {
            content: ''; position: absolute; bottom: 10%; left: 50%;
            transform: translateX(-50%);
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(139,92,246,0.35) 0%, transparent 70%);
            filter: blur(90px); z-index: 2;
            animation: pulse-ring 5s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0%, 100% { opacity: 0.3; transform: translateX(-50%) scale(0.85); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
        }

        .hero h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(5.5rem, 14vw, 10rem); font-weight: 900;
            background: var(--primary-glow);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem; position: relative; z-index: 3;
            line-height: 0.9; letter-spacing: -6px;
            animation: hero-glow 3s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 60px rgba(59,130,246,0.8));
        }

        @keyframes hero-glow {
            from { filter: drop-shadow(0 0 30px rgba(59,130,246,0.6)); }
            to { filter: drop-shadow(0 0 80px rgba(139,92,246,1)); }
        }

        #welcomeSubtitle {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.4rem, 6.5vw, 3.8rem); font-weight: 800;
            background: var(--primary-glow); -webkit-background-clip: text;
            background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(0,242,254,0.9);
            margin-bottom: 2.2rem; letter-spacing: 6px;
            line-height: 1.1; position: relative; z-index: 3;
            opacity: 0;
        }

        .letter {
            display: inline-block; opacity: 0;
            transform: translateY(40px) scale(0.6);
            filter: blur(6px);
            animation: letterPop 1.1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes letterPop {
            0% { opacity: 0; transform: translateY(40px) scale(0.6); filter: blur(6px); }
            50% { transform: translateY(-12px) scale(1.15); filter: blur(0); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        #userStatus {
            font-size: 1.85rem; margin-bottom: 3.5rem;
            opacity: 0.95; min-height: 3rem; font-weight: 600;
            text-shadow: 0 0 20px rgba(0,242,254,0.6);
            position: relative; z-index: 3;
        }

        .btn {
            padding: 1.6rem 4.5rem; border: none;
            background: var(--primary-glow); color: white;
            border-radius: 60px; cursor: pointer;
            font-size: 1.35rem; font-weight: 700;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 15px 40px var(--card-glow);
            position: relative; overflow: hidden;
            text-transform: uppercase; letter-spacing: 2px;
            z-index: 3; will-change: transform, box-shadow;
        }

        .btn:hover {
            transform: translateY(-10px) scale(1.08);
            box-shadow: 0 30px 70px rgba(139,92,246,0.8);
        }

        /* CÁC PHẦN KHÁC */
        section { padding: 140px 5%; max-width: 1480px; margin: 0 auto; }
        h2 { font-family: 'Orbitron', monospace; font-size: 4.2rem; text-align: center; margin-bottom: 4.5rem; background: var(--primary-glow); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; position: relative; font-weight: 800; }
        h2::after { content: ''; position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); width: 140px; height: 6px; background: var(--primary-glow); border-radius: 3px; box-shadow: 0 0 30px var(--primary-glow); }

        .grid, .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 3rem; }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(460px, 1fr)); }

        .card {
            background: var(--glass-dark); backdrop-filter: blur(35px);
            border: 1px solid rgba(255,255,255,0.18); padding: 3.2rem 2.8rem;
            border-radius: 32px; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; overflow: hidden; cursor: pointer;
            box-shadow: 0 15px 50px rgba(0,0,0,0.35);
            will-change: transform, box-shadow, border-color;
        }

        .card:hover { transform: translateY(-22px) scale(1.04); box-shadow: 0 45px 90px rgba(59,130,246,0.4); border-color: rgba(255,255,255,0.5); }

        .card-icon {
            font-size: 4.8rem; margin-bottom: 2rem; display: block; text-align: center;
            filter: drop-shadow(0 0 30px currentColor);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card:hover .card-icon { transform: scale(1.2) rotate(12deg); filter: drop-shadow(0 0 50px currentColor); }

        .checkin-card { background: linear-gradient(135deg, rgba(16,185,129,0.18), rgba(34,197,94,0.1)); border-color: rgba(16,185,129,0.5); }
        .checkin-card .card-icon { color: #10b981; }
        .activity-card { background: linear-gradient(135deg, rgba(245,158,11,0.18), rgba(251,191,36,0.1)); border-color: rgba(245,158,11,0.5); }
        .activity-card .card-icon { color: #f59e0b; }
        .achievement-card { background: linear-gradient(135deg, rgba(239,68,68,0.18), rgba(248,113,113,0.1)); border-color: rgba(239,68,68,0.5); }
        .achievement-card .card-icon { color: #ef4444; }

        .msg-input { max-width: 860px; margin: 0 auto 4rem; display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
        #msgInput { flex: 1; padding: 1.6rem 2.8rem; border: none; border-radius: 30px; background: rgba(255,255,255,0.13); color: white; font-size: 1.25rem; backdrop-filter: blur(25px); min-width: 420px; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); border: 1px solid rgba(255,255,255,0.15); }
        #msgInput:focus { box-shadow: 0 0 45px var(--card-glow); transform: scale(1.03); border-color: var(--accent-glow); }

        .btn-post { padding: 1.6rem 3.5rem; background: var(--primary-glow); border: none; border-radius: 30px; color: white; font-weight: 700; cursor: pointer; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); font-size: 1.25rem; position: relative; overflow: hidden; box-shadow: 0 15px 40px var(--card-glow); }
        .btn-post:hover:not(:disabled) { transform: scale(1.1); box-shadow: 0 25px 60px rgba(59,130,246,0.7); }

        .messages-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(410px, 1fr)); gap: 2.8rem; }
        .msg-card {
            animation: msgSlideIn 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            background: var(--glass-dark); border-radius: 28px; padding: 2.8rem;
            border: 1px solid rgba(255,255,255,0.15); transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 15px 45px rgba(0,0,0,0.3);
        }
        .msg-card:hover { transform: translateY(-12px); box-shadow: 0 30px 70px rgba(139,92,246,0.3); }

        @keyframes msgSlideIn { from { opacity: 0; transform: translateY(60px); } to { opacity: 1; transform: translateY(0); } }

        .checkin-btn {
            background: var(--success-glow); border: none; padding: 1.3rem 3.2rem;
            border-radius: 50px; color: white; font-weight: 700; font-size: 1.25rem;
            cursor: pointer; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 12px 35px rgba(16,185,129,0.5); width: 100%; margin-top: 2rem;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .checkin-btn:hover { transform: scale(1.05); box-shadow: 0 20px 50px rgba(16,185,129,0.7); }
