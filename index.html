<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10A4 ULTRA FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:#0f172a;
  color:white;
  transition:0.3s;
}

body.light{
  background:#f1f5f9;
  color:#000;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  backdrop-filter: blur(10px);
  background:rgba(255,255,255,0.05);
  z-index:999;
}

nav button{
  margin-left:10px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.hero h1{
  font-size:60px;
  background:linear-gradient(45deg,#60a5fa,#a78bfa);
  -webkit-background-clip:text;
  color:transparent;
}

.btn{
  padding:10px 20px;
  border:none;
  background:#6366f1;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* SECTION */
section{padding:80px 20px}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  margin:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
}

/* LOGIN BOX */
#loginBox{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border-radius:10px;
  display:none;
}

</style>
</head>

<body>

<nav>
  <b>10A4</b>
  <div>
    <button onclick="toggleMode()">🌗</button>
    <button onclick="loginGoogle()">🔐</button>
    <button onclick="toggleMusic()">🎵</button>
  </div>
</nav>

<div class="hero">
  <h1>10A4</h1>
  <p id="user">Chưa đăng nhập</p>
  <button class="btn" onclick="scrollToSection()">Vào hệ thống</button>
</div>

<section>
  <h2>Dashboard</h2>
  <div class="grid">
    <div class="card">👥 38 học sinh</div>
    <div class="card">👨‍🏫 Đinh Trung Thiện</div>
    <div class="card">📚 Lớp 10A4</div>
  </div>
</section>

<section>
  <h2>Thông báo</h2>
  <input id="msg" placeholder="Nhập thông báo">
  <button onclick="addMsg()">Đăng</button>
  <div id="list"></div>
</section>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "DÁN_VÀO_ĐÂY",
  authDomain: "DÁN_VÀO_ĐÂY",
  projectId: "DÁN_VÀO_ĐÂY"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN GOOGLE */
function loginGoogle(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
  .then(result=>{
    document.getElementById("user").innerText =
      "Xin chào: " + result.user.displayName;
  });
}

/* ADD MESSAGE */
function addMsg(){
  const msg = document.getElementById("msg").value;
  db.collection("messages").add({
    text: msg,
    time: Date.now()
  });
}

/* REALTIME */
db.collection("messages").orderBy("time","desc")
.onSnapshot(snapshot=>{
  let html="";
  snapshot.forEach(doc=>{
    html += "<div class='card'>"+doc.data().text+"</div>";
  });
  document.getElementById("list").innerHTML = html;
});

/* DARK MODE */
function toggleMode(){
  document.body.classList.toggle("light");
}

/* MUSIC */
let playing=false;
function toggleMusic(){
  let m=document.getElementById("music");
  if(!playing){m.play();playing=true;}
  else{m.pause();playing=false;}
}

/* SCROLL */
function scrollToSection(){
  window.scrollTo({top:600,behavior:"smooth"});
}
</script>

</body>
</html>
