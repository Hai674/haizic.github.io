<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10A4 GOD SYSTEM FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#0f2027;color:white;display:flex;height:100vh}
.sidebar{width:230px;background:#ffffff10;padding:15px}
.main{flex:1;display:flex;flex-direction:column}
.chat{flex:1;overflow:auto;padding:10px}
.msg{padding:10px;margin:5px;border-radius:10px;max-width:70%}
.me{background:#00ffae;color:black;margin-left:auto}
.other{background:#ffffff20}
.input{display:flex;padding:10px}
input{flex:1;padding:10px;border:none;border-radius:10px}
button{padding:10px;margin-left:5px;border:none;border-radius:10px;cursor:pointer}
.gallery img{width:80px;margin:5px;border-radius:10px}
</style>
</head>

<body>

<div id="auth">
  <h3>Login / Register</h3>
  <input id="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div class="sidebar" id="app" style="display:none;">
  <h3>🔥 10A4</h3>
  <p id="userInfo"></p>
  <button onclick="showTab('chat')">Chat</button>
  <button onclick="showTab('ai')">AI</button>
  <button onclick="showTab('gallery')">Gallery</button>
  <button onclick="showTab('rank')">Rank</button>
</div>

<div class="main" id="main" style="display:none;">

  <div id="chatTab" class="chat"></div>

  <div id="aiTab" style="display:none;padding:10px;">
    <h3>🤖 AI</h3>
    <div id="aiChat"></div>
    <input id="aiInput">
    <button onclick="askAI()">Hỏi</button>
  </div>

  <div id="galleryTab" style="display:none;">
    <input type="file" onchange="upload(event)">
    <div class="gallery" id="gallery"></div>
  </div>

  <div id="rankTab" style="display:none;">
    <h3>🏆 Rank</h3>
    <div id="rank"></div>
  </div>

  <div class="input">
    <input id="msg" placeholder="Nhắn gì đó...">
    <button onclick="send()">Gửi</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey:"DÁN",
  authDomain:"DÁN",
  projectId:"DÁN",
  storageBucket:"DÁN"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUserData = {};

// REGISTER
function register(){
  auth.createUserWithEmailAndPassword(email.value, pass.value)
  .then(res=>{
    return db.collection("users").doc(res.user.uid).set({
      name: email.value,
      avatar:"https://i.pravatar.cc/100",
      coin:0,
      exp:0
    });
  });
}

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(email.value, pass.value);
}

// AUTH
auth.onAuthStateChanged(async user=>{
  if(user){
    auth.style.display="none";
    app.style.display="block";
    main.style.display="flex";

    let doc = await db.collection("users").doc(user.uid).get();
    currentUserData = doc.data();

    userInfo.innerHTML = `${currentUserData.name}<br>💰 ${currentUserData.coin} | ⭐ ${currentUserData.exp}`;

    loadChat(user);
    loadGallery();
    loadRank();
  }
});

// CHAT
function send(){
  if(!msg.value) return;

  db.collection("chat").add({
    text:msg.value,
    uid:auth.currentUser.uid,
    name:currentUserData.name,
    avatar:currentUserData.avatar,
    time:Date.now()
  });

  // tăng coin + exp
  db.collection("users").doc(auth.currentUser.uid).update({
    coin: firebase.firestore.FieldValue.increment(5),
    exp: firebase.firestore.FieldValue.increment(10)
  });

  msg.value="";
}

// LOAD CHAT
function loadChat(user){
  db.collection("chat").orderBy("time")
  .onSnapshot(s=>{
    chatTab.innerHTML="";
    s.forEach(doc=>{
      let d = doc.data();
      let cls = d.uid===user.uid?"msg me":"msg other";
      chatTab.innerHTML += `
        <div class="${cls}">
          <b>${d.name}</b><br>
          ${d.text}
        </div>`;
    });
    chatTab.scrollTop = chatTab.scrollHeight;
  });
}

// AI (fallback + có thể nâng API)
async function askAI(){
  let q = aiInput.value;
  let res = "AI chưa cấu hình 😅";

  if(q.toLowerCase().includes("10a4")) res="10A4 là số 1 🔥";
  if(q.toLowerCase().includes("ai đẹp")) res="Bạn đẹp nhất 😎";

  aiChat.innerHTML += `<div><b>Bạn:</b> ${q}<br><b>AI:</b> ${res}</div>`;
  aiInput.value="";
}

// UPLOAD
function upload(e){
  let file = e.target.files[0];
  let ref = storage.ref("img/"+Date.now()+file.name);

  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.collection("gallery").add({url});
    });
  });
}

// LOAD GALLERY
function loadGallery(){
  db.collection("gallery").onSnapshot(s=>{
    gallery.innerHTML="";
    s.forEach(doc=>{
      gallery.innerHTML+=`<img src="${doc.data().url}">`;
    });
  });
}

// RANK
function loadRank(){
  db.collection("users").orderBy("exp","desc")
  .onSnapshot(s=>{
    rank.innerHTML="";
    s.forEach(doc=>{
      let d = doc.data();
      rank.innerHTML+=`<div>${d.name} - ⭐ ${d.exp}</div>`;
    });
  });
}

// TAB
function showTab(t){
  chatTab.style.display="none";
  aiTab.style.display="none";
  galleryTab.style.display="none";
  rankTab.style.display="none";

  if(t==="chat") chatTab.style.display="block";
  if(t==="ai") aiTab.style.display="block";
  if(t==="gallery") galleryTab.style.display="block";
  if(t==="rank") rankTab.style.display="block";
}
</script>

</body>
</html>
